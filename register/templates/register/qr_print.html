<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - {{ file.reference }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; padding: 20px; }
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-card {
            max-width: 400px;
            text-align: center;
            border: 2px solid #000;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <h4 class="mb-1">{{ file.reference }}</h4>
        <p class="text-muted mb-2">{{ file.title }}</p>
        
        {% if file.qr_code %}
        <img src="{{ file.qr_code.url }}" alt="QR Code" class="img-fluid mb-2" style="max-width: 200px;">
        {% endif %}
        
        <hr>
        
        <div class="text-start">
            <small class="d-block"><strong>Department:</strong> {{ file.department.name }}</small>
            <small class="d-block"><strong>Status:</strong> {{ file.get_status_display }}</small>
            <small class="d-block"><strong>ID:</strong> {{ file.uuid }}</small>
        </div>
        
        <hr>
        
        <button class="btn btn-primary no-print" onclick="window.print()">
            <i class="bi bi-printer me-1"></i> Print
        </button>
        <a href="{% url 'file_detail' file.uuid %}" class="btn btn-outline-secondary no-print">
            Back
        </a>
    </div>
</body>
</html>
